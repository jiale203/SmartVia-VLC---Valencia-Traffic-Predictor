    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valencia Traffic Predictor</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }

        /* Layout Container */
        #app-container { display: flex; height: 100vh; width: 100vw; flex-direction: row; }

        /* Map Section */
        #map { flex-grow: 1; height: 100%; z-index: 1; }

        /* Input Panel */
        #panel {
            width: 350px;
            background: #fff;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h2 { margin-top: 0; color: #333; font-size: 1.2rem; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        input, select, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 1rem; }

        button {
            background: #2ecc71; color: white; border: none; cursor: pointer; font-weight: bold;
            margin-top: 10px; transition: 0.3s;
        }
        button:hover { background: #27ae60; }

        /* Night mode */
        body.night-mode #panel { background: #1e1e1e; color: #ddd; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
        body.night-mode h1, body.night-mode h2 { color: #eee; }
        body.night-mode label { color: #ccc; }
        body.night-mode input, body.night-mode select { background: #2a2a2a; color: #ddd; border-color: #444; }
        body.night-mode #legend { color: #bbb; }
        body.night-mode #status { color: #999; }
        body.night-mode #summary { color: #aaa; }

        #top-controls {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            display: flex; gap: 8px; align-items: center;
        }

        #theme-toggle {
            background: #333; color: #fff; border: none; border-radius: 50%;
            width: 40px; height: 40px; font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3); transition: 0.3s;
            margin-top: 0;
        }
        #theme-toggle:hover { background: #555; }

        .lang-btn {
            background: #555; color: #fff; border: none; border-radius: 5px;
            padding: 6px 10px; font-size: 0.75rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3); transition: 0.3s; margin-top: 0;
        }
        .lang-btn:hover { background: #777; }
        .lang-btn.active { background: #c0582a; }
        body.night-mode .lang-btn.active { background: #d4910a; }

        /* RESPONSIVE: Mobile Tweak */
        @media (max-width: 768px) {
            #app-container { flex-direction: column-reverse; }
            #panel {
                width: 100%; height: 40%; box-sizing: border-box;
                position: absolute; bottom: 0; border-radius: 20px 20px 0 0;
            }
            #map { height: 60%; }
        }
    </style>
</head>
<body>

<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P8W6ND5J"

<div id="app-container">
    <div id="panel">
    	<div style="display: flex; align-items: center; gap: 10px;">
            <img src="smartvia-logo-light.svg" alt="SmartVia" style="width: 42px; height: 42px; border-radius: 10px;">
            <h1 style="margin: 0;">SmartVia <span style="font-size: 0.6em; color: #e67e22;">VLC</span></h1>
        </div>
        <h2 data-i18n="subtitle">Valencia Traffic Predictor</h2>
        <div class="form-group">
            <label data-i18n="datetime">Date & Time</label>
            <div style="display: flex; gap: 5px;">
                <input type="datetime-local" id="dateTime" style="flex: 1;">
                <button onclick="setNow()" data-i18n="now" style="margin-top: 0; padding: 10px 14px; font-size: 0.85rem;">Now</button>
            </div>
        </div>
        <div class="form-group">
            <label data-i18n="weather">Weather Condition</label>
            <select id="weather">
                <option value="clear" selected data-i18n="clear">Clear Sky</option>
                <option value="cloudy" data-i18n="cloudy">Cloudy</option>
                <option value="rain" data-i18n="rain">Rainy</option>
            </select>
        </div>
        <div class="form-group">
            <label data-i18n="duration">Duration (hours)</label>
            <select id="duration">
                <option value="1" data-i18n="1h">1 hour</option>
                <option value="2" selected data-i18n="2h">2 hours</option>
                <option value="4" data-i18n="4h">4 hours</option>
            </select>
        </div>
        <div class="form-group">
            <label data-i18n="events">Events</label>
            <div style="display: flex; flex-wrap: wrap; gap: 8px 16px;">
                <label style="font-size: 0.9rem; display: flex; align-items: center; gap: 4px;">
                    <input type="checkbox" id="schoolHoliday"> <span data-i18n="schoolHoliday">School Holiday</span>
                </label>
                <label style="font-size: 0.9rem; display: flex; align-items: center; gap: 4px;">
                    <input type="checkbox" id="fallas"> <span data-i18n="fallas">Fallas</span>
                </label>
                <label style="font-size: 0.9rem; display: flex; align-items: center; gap: 4px;">
                    <input type="checkbox" id="marathon"> <span data-i18n="marathon">Marathon</span>
                </label>
            </div>
        </div>
        <button onclick="runMLPrediction()" data-i18n="update">Update Map Predictions</button>
        <div id="status" style="font-size: 0.8rem; color: #777;" data-i18n="status_ready">ML Model: LightGBM</div>
        <div id="summary" style="font-size: 0.8rem; color: #555; display: none;"></div>
        <div id="legend" style="font-size: 0.75rem; margin-top: 5px;">
            <b data-i18n="legend">Legend:</b><br>
            <span style="color:#2ecc71;">■</span> <span data-i18n="leg_fluido">Fluido</span><br>
            <span style="color:#f1c40f;">■</span> <span data-i18n="leg_low">Low risk</span><br>
            <span style="color:#e67e22;">■</span> <span data-i18n="leg_moderate">Moderate</span><br>
            <span style="color:#e74c3c;">■</span> <span data-i18n="leg_high">High risk</span><br>
            <span style="color:#3498db;">■</span> <span data-i18n="leg_nodata">No data</span>
        </div>
    </div>

    <div id="map"></div>
    <div id="top-controls">
        <button class="lang-btn" onclick="setLanguage('es')">ES</button>
        <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('va')">VA</button>
        <button class="lang-btn" onclick="setLanguage('zh')">CN</button>
        <button id="theme-toggle" onclick="toggleTheme()">&#9790;</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const i18n = {
        en: {
            subtitle: "Valencia Traffic Predictor",
            datetime: "Date & Time", now: "Now",
            weather: "Weather Condition", clear: "Clear Sky", cloudy: "Cloudy", rain: "Rainy",
            duration: "Duration (hours)", "1h": "1 hour", "2h": "2 hours", "4h": "4 hours",
            events: "Events", schoolHoliday: "School Holiday", fallas: "Fallas", marathon: "Marathon",
            update: "Update Map Predictions",
            status_ready: "ML Model: LightGBM",
            status_calc: "Calculating predictions...",
            status_done: "Predictions updated",
            status_error: "Error: Could not connect to model server",
            legend: "Legend:", leg_fluido: "Fluido", leg_low: "Low risk",
            leg_moderate: "Moderate", leg_high: "High risk", leg_nodata: "No data",
            fluido: "fluido", no_fluido: "no_fluido", congested: "congested",
            avg_prob: "Avg probability", roads: "roads", avg_risk: "Avg risk"
        },
        es: {
            subtitle: "Predictor de Tráfico de Valencia",
            datetime: "Fecha y Hora", now: "Ahora",
            weather: "Condición Meteorológica", clear: "Despejado", cloudy: "Nublado", rain: "Lluvioso",
            duration: "Duración (horas)", "1h": "1 hora", "2h": "2 horas", "4h": "4 horas",
            events: "Eventos", schoolHoliday: "Vacaciones Escolares", fallas: "Fallas", marathon: "Maratón",
            update: "Actualizar Predicciones",
            status_ready: "Modelo ML: LightGBM",
            status_calc: "Calculando predicciones...",
            status_done: "Predicciones actualizadas",
            status_error: "Error: No se pudo conectar al servidor",
            legend: "Leyenda:", leg_fluido: "Fluido", leg_low: "Riesgo bajo",
            leg_moderate: "Moderado", leg_high: "Riesgo alto", leg_nodata: "Sin datos",
            fluido: "fluido", no_fluido: "no_fluido", congested: "congestionado",
            avg_prob: "Probabilidad media", roads: "carreteras", avg_risk: "Riesgo medio"
        },
        va: {
            subtitle: "Predictor de Trànsit de València",
            datetime: "Data i Hora", now: "Ara",
            weather: "Condició Meteorològica", clear: "Cel clar", cloudy: "Ennuvolat", rain: "Plujós",
            duration: "Duració (hores)", "1h": "1 hora", "2h": "2 hores", "4h": "4 hores",
            events: "Esdeveniments", schoolHoliday: "Vacances Escolars", fallas: "Falles", marathon: "Marató",
            update: "Actualitzar Prediccions",
            status_ready: "Model ML: LightGBM",
            status_calc: "Calculant prediccions...",
            status_done: "Prediccions actualitzades",
            status_error: "Error: No s'ha pogut connectar al servidor",
            legend: "Llegenda:", leg_fluido: "Fluid", leg_low: "Risc baix",
            leg_moderate: "Moderat", leg_high: "Risc alt", leg_nodata: "Sense dades",
            fluido: "fluid", no_fluido: "no_fluid", congested: "congestionat",
            avg_prob: "Probabilitat mitjana", roads: "carreteres", avg_risk: "Risc mitjà"
        },
        zh: {
            subtitle: "瓦伦西亚交通预测",
            datetime: "日期和时间", now: "现在",
            weather: "天气状况", clear: "晴天", cloudy: "多云", rain: "下雨",
            duration: "时长（小时）", "1h": "1小时", "2h": "2小时", "4h": "4小时",
            events: "事件", schoolHoliday: "学校假期", fallas: "法雅节", marathon: "马拉松",
            update: "更新地图预测",
            status_ready: "机器学习模型：LightGBM",
            status_calc: "正在计算预测...",
            status_done: "预测已更新",
            status_error: "错误：无法连接到服务器",
            legend: "图例：", leg_fluido: "畅通", leg_low: "低风险",
            leg_moderate: "中等", leg_high: "高风险", leg_nodata: "无数据",
            fluido: "畅通", no_fluido: "拥堵", congested: "拥堵",
            avg_prob: "平均概率", roads: "条道路", avg_risk: "平均风险"
        }
    };
    let currentLang = 'en';

    function setLanguage(lang) {
        currentLang = lang;
        const t = i18n[lang];
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (t[key]) el.textContent = t[key];
        });
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent === lang.toUpperCase());
        });
    }

    // 0. Set datetime input to current time
    function setNow() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('dateTime').value = now.toISOString().slice(0, 16);
    }
    setNow();

    // 1. Initialize Map centered on Valencia
    const map = L.map('map', { zoomControl: false }).setView([39.4699, -0.3763], 13);

    const jawgToken = 'nTsc1whsOamoI4PrQtRDqSfrZL6ujl6ISPdpa289UrLZY9DI1WiLwXIXh3D3kqKN';
    const lightTiles = L.tileLayer('https://{s}.tile.jawg.io/jawg-light/{z}/{x}/{y}{r}.png?access-token=' + jawgToken, {
        attribution: '&copy; JawgMaps &copy; OpenStreetMap'
    });
    const darkTiles = L.tileLayer('https://{s}.tile.jawg.io/jawg-dark/{z}/{x}/{y}{r}.png?access-token=' + jawgToken, {
        attribution: '&copy; JawgMaps &copy; OpenStreetMap'
    });
    lightTiles.addTo(map);
    let isNight = false;

    function toggleTheme() {
        isNight = !isNight;
        document.body.classList.toggle('night-mode', isNight);
        if (isNight) {
            map.removeLayer(lightTiles);
            darkTiles.addTo(map);
            document.getElementById('theme-toggle').innerHTML = '&#9788;';
        } else {
            map.removeLayer(darkTiles);
            lightTiles.addTo(map);
            document.getElementById('theme-toggle').innerHTML = '&#9790;';
        }
    }

    // Store layer group for easy clearing
    let trafficLayer = L.layerGroup().addTo(map);


    // Build lookup: denominacion -> list of polylines (multiple GIDs can share a name)
    let lineasPorDenom = {};
    let lineasPorGid = {};

    tramosValencia.forEach(tramo => {
        const poly = L.polyline(tramo.coords, {
            color: '#3498db',
            weight: 5,
            opacity: 0.7,
            lineJoin: 'round'
        }).addTo(map);

        poly.bindPopup(`<b>${tramo.denominacion}</b>`);
        lineasPorGid[tramo.gid] = poly;

        if (!lineasPorDenom[tramo.denominacion]) {
            lineasPorDenom[tramo.denominacion] = [];
        }
        lineasPorDenom[tramo.denominacion].push(poly);
    });

    function getColor(prob) {
        if (prob < 0.50) return '#2ecc71';      // green
        if (prob < 0.80) return '#f1c40f';      // yellow
        if (prob < 0.90) return '#e67e22';      // orange
        return '#e74c3c';                        // red
    }

    function buildTimelineHTML(road, data) {
        const t = i18n[currentLang];
        let html = `<b>${road}</b><br>`;
        html += `<span>${t.avg_prob}: ${(data.probability * 100).toFixed(1)}%</span><br>`;
        html += `<table style="font-size:12px; margin-top:5px; border-collapse:collapse;">`;
        html += `<tr><th style="padding:2px 6px;">Time</th><th style="padding:2px 6px;">Prob</th><th style="padding:2px 6px;">State</th></tr>`;
        data.timeline.forEach(entry => {
            const color = getColor(entry.probability);
            const label = entry.state === 1 ? t.no_fluido : t.fluido;
            html += `<tr>
                <td style="padding:2px 6px;">${entry.time}</td>
                <td style="padding:2px 6px;">${(entry.probability * 100).toFixed(1)}%</td>
                <td style="padding:2px 6px; color:${color}; font-weight:bold;">${label}</td>
            </tr>`;
        });
        html += `</table>`;
        return html;
    }

    async function runMLPrediction() {
        const dateTime = document.getElementById('dateTime').value;
        const weather = document.getElementById('weather').value;
        const duration = parseInt(document.getElementById('duration').value);
        const schoolHoliday = document.getElementById('schoolHoliday').checked ? 1 : 0;
        const fallas = document.getElementById('fallas').checked ? 1 : 0;
        const football = 0;
        const marathon = document.getElementById('marathon').checked ? 1 : 0;

        document.getElementById('status').innerText = i18n[currentLang].status_calc;
        document.getElementById('status').style.color = '#e67e22';

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    datetime: dateTime, weather: weather, duration: duration,
                    school_holiday: schoolHoliday, fallas: fallas,
                    football: football, marathon: marathon
                })
            });

            const predictions = await response.json();

            // update roads that have predictions
            Object.entries(predictions).forEach(([road, data]) => {
                const polylines = lineasPorDenom[road];
                if (polylines) {
                    const color = getColor(data.probability);
                    polylines.forEach(poly => {
                        poly.setStyle({ color: color, weight: 8, opacity: 1 });
                        poly.bindPopup(buildTimelineHTML(road, data));
                    });
                }
            });

            const total = Object.keys(predictions).length;
            const congested = Object.values(predictions).filter(d => d.state === 1).length;
            const fluido = total - congested;
            const avgProb = (Object.values(predictions).reduce((s, d) => s + d.probability, 0) / total * 100).toFixed(1);

            const t = i18n[currentLang];
            document.getElementById('status').innerText = `${t.status_done} (${total} ${t.roads})`;
            document.getElementById('status').style.color = '#2ecc71';

            const summaryEl = document.getElementById('summary');
            summaryEl.style.display = 'block';
            summaryEl.innerHTML = `<b>${fluido}</b> ${t.fluido} · <b>${congested}</b> ${t.congested} · ${t.avg_risk}: <b>${avgProb}%</b>`;

        } catch (error) {
            console.error('Prediction error:', error);
            document.getElementById('status').innerText = i18n[currentLang].status_error;
            document.getElementById('status').style.color = '#e74c3c';
        }
    }
</script>

</body>
</html>
